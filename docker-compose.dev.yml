services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: freeframe
      POSTGRES_PASSWORD: freeframe
      POSTGRES_DB: freeframe
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeframe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Allow browser uploads from any origin (host-independent), overridable.
      # NOTE: MINIO_API_CORS_ALLOW_ORIGIN is MinIO's real env var (the `api`
      # config subsystem). Upstream's MINIO_CORS_ALLOW_ORIGIN / _METHODS /
      # _HEADERS / _EXPOSE_HEADERS are not recognised by MinIO and silently do
      # nothing — deliberately not adopted. Access stays gated by presigned-URL
      # signatures regardless.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-*}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/freeframe;
      mc anonymous set download local/freeframe;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      # Storage: "minio" for local MinIO (dev), "s3" for AWS S3 (prod)
      S3_STORAGE: ${S3_STORAGE:-minio}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-freeframe}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Base URL baked into presigned upload/download URLs — the BROWSER must be
      # able to reach it. Default localhost:9000 works only when the browser runs
      # on the same host. Accessing remotely (LAN/Tailscale)? Set S3_PUBLIC_ENDPOINT
      # in .env to the server's reachable MinIO address, e.g. http://<host-ip>:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: >
      sh -c "cd /workspace/apps/api && alembic upgrade head && cd /workspace && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      S3_STORAGE: ${S3_STORAGE:-minio}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-freeframe}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: celery -A apps.api.tasks.celery_app worker -Q transcoding -c ${TRANSCODING_CONCURRENCY:-2} --loglevel=info

  email_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://freeframe:freeframe@postgres:5432/freeframe
      REDIS_URL: redis://redis:6379/0
      S3_STORAGE: ${S3_STORAGE:-minio}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-freeframe}
      S3_REGION: ${S3_REGION:-us-east-1}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages/transcoder:/workspace/packages/transcoder
    command: celery -A apps.api.tasks.celery_app worker -Q email_high,email_low -c ${EMAIL_CONCURRENCY:-2} --loglevel=info

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      # Browser calls the API at the same origin via "/api" (no CORS, no
      # hardcoded host — works locally and behind a reverse proxy / Tailscale).
      # Overridable, but "/api" is the host-independent default we rely on.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      # Server-side proxy target for the "/api" rewrite (Next server -> api service).
      - API_PROXY_TARGET=${API_PROXY_TARGET:-http://api:8000}
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm install && npx next dev --hostname 0.0.0.0"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  pgdata:
  miniodata:
  redisdata:
  web_node_modules:
